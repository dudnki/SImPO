# Task Arithmetic 적용 설정 (다중 벡터 합성 지원)

# fp16 베이스 모델 (4-bit 아닌 fp16 필수 — weight 직접 합산 때문)
base_model: "unsloth/Llama-3.2-3B-Instruct-bnb-4bit"

# 합산할 Task Vector 목록 (순서대로 적용)
vector_paths:
  - "data/task_vectors/helpfulness_simpo.pt"
  - "data/task_vectors/coding_simpo_orth.pt"

# 태스크별 평가 데이터셋 및 설정
eval_datasets:
  helpfulness: "data/processed/helpfulness"
  coding: "data/processed/coding"

output_dir: "outputs/merged"

# λ 스윕 (모든 벡터에 동일한 λ 적용)
lambdas: [0.0, 0.7, 1.0, 1.3]

eval:
  split: "test"
  num_samples: 200
  max_new_tokens: 256
  # Preference 태스크는 system prompt 없이 직접 평가
  task_prompts: {}

# SimPO margin 계산 시 사용할 beta/gamma (학습 때와 동일)
simpo:
  beta: 2.0
  gamma: 0.1

mlflow:
  tracking_uri: "sqlite:///mlflow.db"
  experiment_name: "simpo_task_arithmetic"
